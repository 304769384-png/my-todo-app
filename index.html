<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个 Vibe Coding 网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a237e;
            color: white;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: white;
        }
        p {
            color: white;
            line-height: 1.6;
        }
        input {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 20px;
            width: 200px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 32px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>我的第一个 Vibe Coding 网页</h1>
    <p>
        你好！欢迎来到我的网页。这是我通过 Vibe Coding 创建的第一个网页。
        我正在学习 HTML、CSS 和 JavaScript，希望通过不断练习来提升自己的编程技能。
        期待创造出更多有趣的作品！
    </p>
    <input type="text" id="nameInput" placeholder="请输入你的名字">
    <br>
    <button onclick="greet()">点击我</button>

    <script>
        function greet() {
            const name = document.getElementById('nameInput').value;
            if (name) {
                alert('你好，' + name + '！');
            } else {
                alert('你好，朋友！');
            }
        }
    </script>
</body>
</html>
